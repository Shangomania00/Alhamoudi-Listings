<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Al Hamoudi Real Estate Listings</title>
<meta name="description" content="Browse verified UAE real estate opportunities from Al Hamoudi Real Estate.">
<style>
:root{
  --bg:#0b0c0c;--panel:#151615;--panel2:#1d1e1d;--line:#39352a;
  --text:#f8f6ef;--muted:#aaa79e;--gold:#d8c47d;--gold2:#f2e2a4;
  --danger:#ef6b6b;--success:#62d89c;--shadow:0 20px 55px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:
linear-gradient(rgba(7,8,8,.94),rgba(7,8,8,.94)),
url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1800&q=80') center/cover fixed;
color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}
button,input,select,textarea,a{font:inherit}
a{color:inherit}
.shell{max-width:1500px;margin:auto;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 16px;
background:rgba(19,20,19,.94);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
position:sticky;top:8px;z-index:30;backdrop-filter:blur(14px)}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:52px;height:52px;object-fit:contain;background:#fff;border-radius:12px;padding:6px}
.brand h1{font-size:clamp(17px,2vw,25px);margin:0}
.brand p{font-size:11px;color:var(--muted);margin:3px 0 0}
.actions{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:10px 13px;border-radius:11px;
font-weight:750;cursor:pointer;transition:.18s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn:hover{transform:translateY(-1px);border-color:var(--gold)}
.btn.primary{background:var(--gold);color:#17150f;border-color:transparent}
.btn.danger{background:#6a2929;border-color:#934040}
.btn.success{background:#183d2d;border-color:#2b7050}
.layout{display:grid;grid-template-columns:360px 1fr;gap:16px;margin-top:16px}
.panel{background:rgba(18,19,18,.95);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.sidebar{padding:16px;align-self:start;position:sticky;top:96px;max-height:calc(100vh - 110px);overflow:auto}
.main{padding:16px;min-width:0}
h2{margin:0 0 14px}
.field{margin-bottom:11px}
.field label{display:block;color:var(--gold2);font-size:11px;font-weight:850;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);
border-radius:10px;padding:10px 11px;outline:none}
.field textarea{min-height:78px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-actions{display:flex;gap:8px;position:sticky;bottom:-16px;background:linear-gradient(transparent,var(--panel) 24%);padding-top:18px}
.form-actions .btn{flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:13px}
.stat b{display:block;color:var(--gold);font-size:21px}
.stat span{color:var(--muted);font-size:11px}
.filters{display:grid;grid-template-columns:2fr repeat(4,1fr);gap:8px;margin-bottom:13px}
.filters input,.filters select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:12px}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.18s}
.card:hover{transform:translateY(-2px);border-color:var(--gold)}
.photo{height:165px;background:linear-gradient(135deg,#31312c,#57523c);background-position:center;background-size:cover;display:flex;align-items:end}
.tag{margin:9px;background:rgba(0,0,0,.72);padding:6px 8px;border-radius:8px;font-size:10px;font-weight:850}
.card-body{padding:12px}
.card h3{margin:0 0 4px;font-size:17px}
.location{font-size:11px;color:var(--muted)}
.price{color:var(--gold);font-size:22px;font-weight:900;margin:10px 0}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.meta div{background:rgba(255,255,255,.035);border-radius:8px;padding:8px 5px;text-align:center;font-size:10px}
.notes{margin-top:8px;padding:9px;border:1px solid var(--line);border-radius:9px;color:#dedbd1;font-size:11px;line-height:1.5;min-height:54px}
.small{font-size:10px;color:var(--muted);line-height:1.5}
.card-actions{display:flex;gap:6px;margin-top:10px}
.card-actions .btn{flex:1;padding:8px 6px;font-size:11px}
.empty{text-align:center;color:var(--muted);border:1px dashed var(--line);padding:55px 20px;border-radius:14px}
.notice{padding:10px 12px;border-radius:10px;margin-bottom:12px;font-size:12px;display:none}
.notice.show{display:block}.notice.ok{background:#173d2d;color:#b9f1d0}.notice.err{background:#512828;color:#ffd0d0}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{width:min(430px,100%);background:rgba(18,19,18,.97);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow)}
.login-card .brand{margin-bottom:20px}.login-card h2{margin-bottom:6px}.login-card p{color:var(--muted);font-size:12px}
.filebox{border:1px dashed var(--gold);border-radius:11px;padding:12px;text-align:center;color:var(--muted);font-size:11px}
.toggle{display:flex;align-items:center;gap:8px;color:var(--text);font-size:12px}
.toggle input{width:auto}
.public-hero{padding:40px 4px 20px;text-align:center}.public-hero h2{font-size:clamp(27px,4vw,48px);margin-bottom:8px}.public-hero p{color:var(--muted)}
.public-main{padding:16px;background:rgba(18,19,18,.94);border:1px solid var(--line);border-radius:18px}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.sidebar{position:static;max-height:none}.filters{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.shell{padding:9px}.topbar{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.row,.filters{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
@media print{body{background:#fff;color:#111}.topbar,.sidebar,.filters,.stats,.card-actions,.no-print{display:none!important}.shell,.layout,.main,.public-main{display:block;padding:0;margin:0;border:0;background:#fff;box-shadow:none}.cards{grid-template-columns:1fr 1fr}.card{break-inside:avoid;background:#fff;color:#111;border:1px solid #aaa}.location,.small{color:#555}.price{color:#786529}.notes{color:#333}@page{size:A4;margin:12mm}}
</style>
</head>
<body>
<div class="shell">
<header class="topbar">
 <div class="brand"><img src="./assets/logo.png" alt="Al Hamoudi logo"><div><h1>Al Hamoudi Real Estate</h1><p>Verified UAE property opportunities</p></div></div>
 <div class="actions"><button class="btn" onclick="window.print()">🖨 Print</button><a class="btn primary" href="https://wa.me/971508800104" target="_blank">WhatsApp</a></div>
</header>

<section class="public-hero">
 <h2>Find Your Next Property in the UAE</h2>
 <p>Clear, updated and professional listings for buyers, tenants and investors.</p>
</section>

<main class="public-main">
 <div id="notice" class="notice"></div>
 <div class="filters">
  <input id="search" placeholder="Search location or property..." oninput="render()">
  <select id="fEmirate" onchange="render()"><option value="">All Emirates</option><option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option><option>Ajman</option><option>Ras Al Khaimah</option><option>Fujairah</option><option>Umm Al Quwain</option></select>
  <select id="fPurpose" onchange="render()"><option value="">All Purposes</option><option>Sale</option><option>Rent</option><option>Off-plan</option><option>Investment</option><option>JV</option></select>
  <select id="fType" onchange="render()"><option value="">All Types</option><option>Villa</option><option>Apartment</option><option>Townhouse</option><option>Land</option><option>Building</option><option>Commercial</option><option>Warehouse</option><option>Hotel</option><option>Office</option><option>Other</option></select>
  <select id="sort" onchange="render()"><option value="featured">Featured</option><option value="newest">Newest</option><option value="priceHigh">Price High-Low</option><option value="priceLow">Price Low-High</option></select>
 </div>
 <div id="cards" class="cards"></div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
let properties=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const money=n=>'AED '+Number(n||0).toLocaleString('en-AE');
async function loadProperties(){
 const {data,error}=await supabaseClient.from('properties').select('*').eq('is_public',true).order('sort_order',{ascending:true}).order('created_at',{ascending:false});
 if(error){const n=$('notice');n.className='notice show err';n.textContent='Listings could not be loaded: '+error.message;return}
 properties=data||[];render();
}
function render(){
 const q=$('search').value.toLowerCase(),em=$('fEmirate').value,pu=$('fPurpose').value,ty=$('fType').value;
 let list=properties.filter(x=>{const blob=[x.title,x.area,x.property_type,x.notes].join(' ').toLowerCase();return(!q||blob.includes(q))&&(!em||x.emirate===em)&&(!pu||x.purpose===pu)&&(!ty||x.property_type===ty)});
 const s=$('sort').value;if(s==='newest')list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));if(s==='priceHigh')list.sort((a,b)=>b.price-a.price);if(s==='priceLow')list.sort((a,b)=>a.price-b.price);if(s==='featured')list.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
 $('cards').innerHTML=list.length?list.map(x=>`<article class="card"><div class="photo" style="${x.photo_url?`background-image:url('${esc(x.photo_url)}')`:''}"><span class="tag">${esc(x.purpose)} · ${esc(x.status)}</span></div><div class="card-body"><h3>${esc(x.title)}</h3><div class="location">${esc(x.area||x.emirate)} · ${esc(x.emirate)}</div>${x.location_url?`<a class="small" style="color:var(--gold)" target="_blank" href="${esc(x.location_url)}">📍 Open location</a>`:''}<div class="price">${money(x.price)}</div><div class="meta"><div>🛏 ${esc(x.bedrooms||'-')} Beds</div><div>🛁 ${esc(x.bathrooms||'-')} Baths</div><div>◫ ${Number(x.size_sqft||0).toLocaleString()} ft²</div></div><div class="notes">${[x.feature_1,x.feature_2,x.feature_3,x.notes].filter(Boolean).map(v=>'✓ '+esc(v)).join('<br>')||'Contact us for full details.'}</div><div class="small" style="margin-top:8px">Ref: ${esc(x.reference||'-')} · Agent: ${esc(x.agent||'Al Hamoudi Real Estate')}</div><div class="card-actions"><a class="btn primary" target="_blank" href="https://wa.me/${String(x.contact||'971508800104').replace(/\D/g,'')}?text=${encodeURIComponent('Hello, I am interested in '+x.title+' (Ref: '+(x.reference||'-')+')')}">WhatsApp</a><button class="btn" onclick="window.print()">Print</button></div></div></article>`).join(''):'<div class="empty">No public listings are available right now.</div>';
}
loadProperties();
</script>
</body></html>
